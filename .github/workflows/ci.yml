name: CI

on:
  push:
    branches:
      - main
      - '**'
  pull_request:

permissions:
  contents: read
  packages: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Tests
        run: go test ./...

      - name: Build Adapter
        run: go build ./cmd/tcpadapter

      - name: Build Controller Simulator
        run: go build ./cmd/controller-sim

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Docker Build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: false


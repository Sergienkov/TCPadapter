name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      DEPLOY_PATH: /opt/tcpadapter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute Image Name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Login To GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build And Push Adapter Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VERSION=main
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.run_id }}
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:main

      - name: Upload Compose File
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: docker-compose.yml
          target: ${{ env.DEPLOY_PATH }}
          overwrite: true

      - name: Deploy On Server
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_TAG: ${{ github.sha }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          envs: IMAGE_NAME,IMAGE_TAG,DEPLOY_PATH,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -eu
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            export TCPADAPTER_IMAGE="$IMAGE_NAME:$IMAGE_TAG"
            docker compose pull adapter
            docker compose up -d adapter
            for _ in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:18080/readyz >/dev/null; then
                exit 0
              fi
              sleep 2
            done
            curl -fsS http://127.0.0.1:18080/readyz
